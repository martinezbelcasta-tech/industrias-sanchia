<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Industrias Sanchia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.jpg" alt="Sanchia">
      <div>
        <div class="brand__name">SANCHIA</div>
        <div class="brand__sub">Corporation</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav__label">Panel</div>
      <button class="nav__item" data-view="resumen" data-screen-label="Resumen General">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Resumen General
      </button>
      <div class="nav__label" style="margin-top:8px">Operación</div>
      <button class="nav__item" data-view="tiempos" data-screen-label="Tiempos de Arranque">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Tiempos de Arranque
      </button>
      <button class="nav__item" data-view="incap" data-screen-label="Registro de Incapacidades">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M12 12v5M9.5 14.5h5"/></svg>
        Registro de Incapacidades
      </button>
    </nav>

    <div class="sidebar__foot">
      <span class="avatar">DS</span>
      <div>
        <strong>Dirección</strong>
        <small>Planta Sanchia</small>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar__title">
        <h1 id="pageTitle">Resumen General</h1>
        <p id="pageSub">Panel ejecutivo</p>
      </div>
      <div class="topbar__tools">
        <button class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
          Mayo 2026
        </button>
        <button class="btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 4v12M7 11l5 5 5-5M5 20h14"/></svg>
          Exportar reporte
        </button>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>

</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1b3a6b"/>
    <circle cx="50" cy="42" r="20" fill="none" stroke="#b8941f" stroke-width="7"/>
    <rect x="30" y="68" width="40" height="6" rx="3" fill="#fff"/>
    <rect x="36" y="80" width="28" height="5" rx="2.5" fill="#b8941f"/>
  </svg>
</template>

<script src="data.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>
</body>
</html>
